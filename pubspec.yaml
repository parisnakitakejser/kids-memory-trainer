name: memory_game
description: "A visually appealing macOS memory game in Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  shared_preferences: ^2.2.3
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - images/
    - build_assets/animals/
    - build_assets/numbers/
    - build_assets/letters/en/
    - build_assets/letters/da/
    - build_assets/colors/
    - assets/sounds/
