name: macOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-latest

    env:
      APP_NAME: kids-memory-trainer
      APP_PATH: build/macos/Build/Products/Release/kids-memory-trainer.app
      ZIP_NAME: kids-memory-trainer-macos-${{ github.ref_name }}.zip
      NOTARY_ZIP_NAME: kids-memory-trainer-macos-${{ github.ref_name }}-notary.zip
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Optimize image assets
        run: ./tool/optimize_assets.sh

      - name: Validate signing secrets
        if: ${{ env.MACOS_CERTIFICATE_BASE64 != '' }}
        run: |
          missing=0
          for name in \
            MACOS_CERTIFICATE_PASSWORD \
            MACOS_KEYCHAIN_PASSWORD \
            MACOS_CODESIGN_IDENTITY \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_TEAM_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required when MACOS_CERTIFICATE_BASE64 is set."
              missing=1
            fi
          done
          exit "$missing"

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS release
        run: flutter build macos --release

      - name: Import Developer ID certificate
        if: ${{ env.MACOS_CERTIFICATE_BASE64 != '' }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MACOS_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign macOS app with Developer ID
        if: ${{ env.MACOS_CERTIFICATE_BASE64 != '' }}
        run: |
          codesign --force --deep --timestamp --options runtime \
            --entitlements macos/Runner/Release.entitlements \
            --sign "$MACOS_CODESIGN_IDENTITY" \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Ad-hoc sign macOS app
        if: ${{ env.MACOS_CERTIFICATE_BASE64 == '' }}
        run: |
          echo "::warning::Using ad-hoc signing. Gatekeeper will not trust this app for public distribution. Configure Developer ID signing and notarization secrets."
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --verbose=2 "$APP_PATH"

      - name: Create notarization archive
        if: ${{ env.MACOS_CERTIFICATE_BASE64 != '' }}
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "$NOTARY_ZIP_NAME"

      - name: Notarize macOS app
        if: ${{ env.MACOS_CERTIFICATE_BASE64 != '' }}
        run: |
          xcrun notarytool submit "$NOTARY_ZIP_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple and validate notarization
        if: ${{ env.MACOS_CERTIFICATE_BASE64 != '' }}
        run: |
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      - name: Package app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "$ZIP_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kids-memory-trainer-macos-${{ github.ref_name }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
