name: macOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-latest

    env:
      APP_NAME: kids-memory-trainer
      APP_PATH: build/macos/Build/Products/Release/kids-memory-trainer.app
      ZIP_NAME: kids-memory-trainer-macos-${{ github.ref_name }}.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS release
        run: flutter build macos --release

      - name: Ad-hoc sign macOS app
        run: |
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --verbose=2 "$APP_PATH"

      - name: Package app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "$ZIP_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kids-memory-trainer-macos-${{ github.ref_name }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true