name: macOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/memory_game.app \
            memory_game-macos-${{ github.ref_name }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: memory_game-macos-${{ github.ref_name }}
          path: memory_game-macos-${{ github.ref_name }}.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: memory_game-macos-${{ github.ref_name }}.zip
          generate_release_notes: true
