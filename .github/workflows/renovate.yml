name: Renovate

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. This runs before 5am in Europe/Copenhagen all year.
    - cron: '30 2 * * *'

permissions:
  contents: read

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Renovate token
        run: |
          if [ -z "$RENOVATE_TOKEN" ]; then
            echo "::error::Missing RENOVATE_TOKEN secret. Add a GitHub PAT as repository secret RENOVATE_TOKEN."
            exit 1
          fi
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.14
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: info
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
